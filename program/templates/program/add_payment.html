<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Добавление заказа | Программа для строителей</title>
    <style>
        /* Повторяем стили шапки и навигационного меню */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        
        header {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 1em 0;
        }
        
        nav ul {
            list-style-type: none;
            padding: 0;
            display: flex;
            justify-content: center;
            gap: 1rem;
        }
        
        nav a {
            color: black;
            text-decoration: none;
            padding: 0.5em 1em;
            border-radius: 5px;
            transition: all 0.3s ease-in-out;
        }
        
        nav a:hover {
            background-color: #ddd;
        }
        
        .container {
            max-width: 1200px;
            margin: auto;
            padding: 20px;
        }
        
        form {
            background-color: #fff;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,.1);
            border-radius: 5px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
        }
        
        input[type=text], select, input[type=number], input[type=date] {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        
        .new-order-button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            font-size: 16px;
            text-decoration: none;
            display: inline-block;
            transition: background-color 0.3s ease;
        }
        
        .new-order-button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    
    <!-- Шапка сайта -->
    <header>
        <h1>Добовление расходника</h1>
    </header>

    <a href="{% url 'consumables' _id=id %}" class="new-order-button"><- Назад</a>

    <!-- Контейнер формы добавления заказа -->
    <div class="container">
        <h1>Добавление нового заказа</h1>
        
        <!-- Форма добавления заказа -->
        <form method="post">
            {% csrf_token %}
            
            <label for="projectName">Имя:</label>
            <input type="text" id="projectName" name="name" required>
            
            <label for="cost">Сумма оплаты:</label>
            <input type="number" step="any" min="0" id="cost" name="amount" placeholder="Сумма в рублях" required>

            <button type="submit" class="new-order-button">Создать заказ</button>
        </form>
    </div>
    
</body>
</html>
