<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Добавление расходника | Программа для строителей</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: #f0f2f5;
            margin: 0;
            color: #333;
        }

        header {
            background: #4CAF50;
            color: white;
            text-align: center;
            padding: 15px 0;
            font-size: 24px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .container {
            max-width: 600px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        input,
        select {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
        }

        .btn {
            background: #4CAF50;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }

        .btn:hover {
            background: #45a049;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #4CAF50;
            font-weight: 500;
            text-decoration: none;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <header>Программа для строителей</header>

    <div class="container">
        <a href="{% url 'consumables' _id=order_id %}" class="back-link"><- Назад</a>
                <h1>Добавление расходника</h1>

                <form method="post">
                    {% csrf_token %}
                    <label>Название:</label>
                    <input type="text" name="title" required>

                    <label>Количество:</label>
                    <input type="number" step="0.01" min="0" name="count" required>

                    <label>Единица измерения:</label>
                    <select name="unit" required>
                        <option value="шт">шт</option>
                        <option value="кг">кг</option>
                        <option value="л">л</option>
                        <option value="м">м</option>
                        <option value="м³">м³</option>
                    </select>

                    <label>Цена за ед.:</label>
                    <input type="number" step="0.01" min="0" name="prise" required>

                    <button type="submit" class="btn">Сохранить</button>
                </form>
    </div>
</body>

</html>
