<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Дни заказа | Программа для строителей</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: #f0f2f5;
            margin: 0;
            color: #333;
        }

        header {
            background: #4CAF50;
            color: white;
            text-align: center;
            padding: 15px 0;
            font-size: 24px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        h1 {
            margin-top: 0;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        th,
        td {
            padding: 12px 15px;
            border-bottom: 1px solid #161313;
            text-align: left;
        }

        th {
            background: #f9f9f9;
        }

        tr:hover {
            background: #f1f1f1;
        }

        .btn {
            background: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
        }

        .btn:hover {
            background: #45a049;
        }

        .stats {
            margin-bottom: 20px;
            font-size: 18px;
        }

        .add-btn {
            margin-bottom: 20px;
            display: inline-block;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #4CAF50;
            font-weight: 500;
            text-decoration: none;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <header>Программа для строителей</header>

    <div class="container">
        <a href="{% url 'index' %}" class="back-link"><- Назад</a>
                <h1>Дни заказа</h1>

                <div class="stats">
                    <strong>Общая сумма за все дни:</strong> {{ amount }}
                </div>

                <a href="{% url 'add_day' _id=id %}" class="btn add-btn">Добавить день</a>

                <table border="1">
                    <tr>
                        <th>Дата</th>
                        <th>Сумма расходов</th>
                        <th>Действия</th>
                    </tr>
                    {% for day in days %}
                    <tr>
                        <td>{{ day.date }}</td>
                        <td>{{ day.total_consumables_amount }}</td>
                        <td>
                            <a href="{% url 'consumables' _id=day.id %}" class="btn">Расходники и платежи</a>
                        </td>
                    </tr>
                    {% endfor %}
                </table>

    </div>
</body>

</html>
